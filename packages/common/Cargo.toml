[package]
name = "m0-portal-common"
description = "Shared common utilities for M0 portal"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
name = "m0_portal_common"
crate-type = ["lib"]

[features]
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build", "anchor-lang-idl"]

[dependencies]
anchor-lang.workspace = true
anchor-spl.workspace = true
m0-portal-common-macros = { path = "../common-macros", version = "0.1.0"}
borsh.workspace = true
anchor-lang-idl = { version = "0.1.2", optional = true }
