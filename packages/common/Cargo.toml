[package]
name = "common"
version = "0.1.0"
edition = "2021"

[lib]
name = "common"
crate-type = ["lib"]

[features]
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build", "anchor-lang-idl"]

[dependencies]
anchor-lang.workspace = true
anchor-spl.workspace = true
common-macros = { path = "../common-macros" }
borsh.workspace = true
anchor-lang-idl = { version = "0.1.2", optional = true }
